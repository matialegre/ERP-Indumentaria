<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="description" content="ERP Sistema" />
    <!-- PWA / App mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ERP" />
    <meta name="application-name" content="ERP" />
    <meta name="msapplication-TileColor" content="#1e40af" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>ERP Sistema</title>
    <style>
      /* ── Eliminar toda sensación de "página web" ── */
      *, *::before, *::after {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        box-sizing: border-box;
      }
      html, body {
        overscroll-behavior: none;
        overflow: hidden;
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f1f5f9;
      }
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      /* Scrollbar invisible pero funcional */
      ::-webkit-scrollbar { width: 0px; height: 0px; }
      * { scrollbar-width: none; -ms-overflow-style: none; }
      /* Sin cursor de texto salvo en inputs */
      body { cursor: default; }
      input, textarea, [contenteditable] { cursor: text; }
      button, a, [role="button"], select { cursor: pointer; }
      /* Sin selección de texto salvo en inputs */
      body { user-select: none; -webkit-user-select: none; }
      input, textarea, [contenteditable] { user-select: text; -webkit-user-select: text; }
    </style>
    <script type="module" crossorigin src="/assets/index.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/api.js">
    <link rel="modulepreload" crossorigin href="/assets/createLucideIcon.js">
    <link rel="modulepreload" crossorigin href="/assets/offlineSync.js">
    <link rel="stylesheet" crossorigin href="/assets/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Deshabilitar click derecho
      document.addEventListener("contextmenu", e => e.preventDefault());
    </script>
  </body>
</html>

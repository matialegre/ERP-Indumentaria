# ─── Nginx — Reverse Proxy ERP Mundo Outdoor ───
# Sirve frontend estático + proxy al backend FastAPI
# Rate limiting en API, compresión gzip, headers de seguridad

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Formato de logs ────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Configuración general ──────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Tamaño máximo de upload (50 MB para importación de archivos)
    client_max_body_size 50M;

    # ── Compresión gzip ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Rate limiting para endpoints API (60 req/min por IP) ───────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1r/s;

    # ── Upstream: backend FastAPI ──────────────────────────────────────────────
    upstream backend {
        server backend:8000;
    }

    # ── Servidor principal (HTTP) ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Archivos estáticos del frontend (assets con hash → cache largo) ────
        location /assets/ {
            alias /app/frontend/dist/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Iconos PWA
        location /icons/ {
            alias /app/frontend/dist/icons/;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Manifest y Service Worker (cache corto para actualizaciones PWA)
        location = /manifest.json {
            alias /app/frontend/dist/manifest.json;
            expires 1h;
        }

        location = /sw.js {
            alias /app/frontend/dist/sw.js;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── Proxy API → backend FastAPI ────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts generosos para reportes pesados
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ── WebSocket → backend ────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # ── Health check del backend (sin rate limit) ──────────────────────────
        location = /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── SPA fallback: todo lo demás sirve index.html ───────────────────────
        location / {
            root /app/frontend/dist;
            try_files $uri $uri/ /index.html;

            # index.html nunca se cachea (para que actualizaciones del SPA se reflejen)
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }
    }

    # ── Servidor HTTPS (descomentar cuando se tengan certificados SSL) ─────────
    # server {
    #     listen 443 ssl http2;
    #     server_name erp.mundooutdoor.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # Reusar toda la configuración del bloque HTTP de arriba
    #     # (copiar o incluir las locations)
    # }
}
